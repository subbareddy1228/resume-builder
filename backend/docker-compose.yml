version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: resume_builder_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
      POSTGRES_DB: resume_builder
    ports:
      - "5432:5432"
    volumes:
      - resume_pg_data:/var/lib/postgresql/data

volumes:
  resume_pg_data:
